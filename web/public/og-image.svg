  <circle cx="600" cy="150" r="6" fill="#e6007e"/>
  <text x="600" y="170" font-family="Arial, Helvetica, sans-serif" font-size="92" font-weight="900" fill="#ffffff" text-anchor="middle">🏆</text>
  <text x="600" y="320" font-family="Arial, Helvetica, sans-serif" font-size="84" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">FIFA World Cup <tspan fill="url(#gold)">2026</tspan></text>
  <text x="600" y="390" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#c8cfd8" text-anchor="middle" letter-spacing="6">UNITED STATES · CANADA · MEXICO</text>
  <g transform="translate(600,470)">
